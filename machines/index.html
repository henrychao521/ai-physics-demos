<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>槓桿與滑輪 ｜ 力矩平衡・機械利益</title>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../assets/site.css">
<script defer src="../assets/nav.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif}
  a{color:var(--accent)}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 16px 60px}
  header h1{font-size:1.5rem;margin:.2em 0}
  header p{color:var(--muted);margin:.2em 0 1em;line-height:1.6}
  .badge{display:inline-block;background:var(--panel2);border:1px solid var(--line);
    color:var(--muted);font-size:.72rem;padding:2px 8px;border-radius:99px;margin-right:6px}
  .stage{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px}
  canvas{width:100%;display:block;border-radius:8px;background:#05070b}
  .label{font-size:.8rem;color:var(--muted);margin:0 0 6px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .ctrl{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .ctrl label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px}
  .ctrl .val{color:var(--accent);font-variant-numeric:tabular-nums}
  .ctrl.l .val{color:#4cc2ff}.ctrl.r .val{color:#ff6b9d}
  input[type=range]{width:100%;accent-color:var(--accent)}
  .modes{display:flex;gap:8px;margin:6px 0 14px;flex-wrap:wrap;align-items:center}
  .modes button,.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    padding:8px 14px;border-radius:9px;cursor:pointer;font-size:.85rem;font-family:inherit}
  .modes button.on{background:var(--accent);color:#04121c;border-color:var(--accent);font-weight:700}
  .btn:hover,.modes button:hover{border-color:var(--accent)}
  .stat{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:2px 0}
  .stat .box{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .stat .box .k{font-size:.72rem;color:var(--muted)}
  .stat .box .v{font-size:1.02rem;font-variant-numeric:tabular-nums;font-weight:700}
  .eqbar{margin:14px 0 0;padding:10px 12px;border-radius:10px;text-align:center;font-weight:700}
  .note{background:var(--panel);border-left:3px solid var(--accent2);border-radius:8px;
    padding:12px 14px;color:var(--muted);font-size:.86rem;line-height:1.7;margin-top:18px}
  .note b{color:var(--txt)}.note code{background:var(--bg2);padding:1px 6px;border-radius:5px;color:var(--green);font-size:.85em}
  footer{color:var(--muted);font-size:.78rem;margin-top:26px;text-align:center;line-height:1.7}
</style>
</head>
<body data-demo="槓桿與滑輪">
<div class="wrap">
  <header>
    <span class="badge">力學・簡單機械</span>
    <h1>槓桿與滑輪</h1>
    <p><b>槓桿</b>：兩側「重量 × 力臂」（力矩）相等時平衡。<b>滑輪組</b>：用 N 條繩支撐載重，施力只需 1/N，
       但要拉 N 倍長的繩——<b>省力但費距離</b>，功（力×距離）守恆。</p>
  </header>

  <div class="modes">
    <button class="btn on" id="mLever">槓桿（力矩）</button>
    <button class="btn" id="mPulley">滑輪組</button>
    <span id="leverPresets"><span style="color:var(--muted);font-size:.8rem;margin-left:6px">情境：</span>
      <button class="btn" data-preset="bal">恰好平衡</button>
      <button class="btn" data-preset="adv">小力撬大物</button></span>
  </div>

  <div class="stage">
    <div class="label"><span id="canvasLabel">槓桿：藍=左側力矩，紅=右側力矩，相等則水平平衡</span><span id="sub"></span></div>
    <canvas id="cv" width="1040" height="340"></canvas>
  </div>

  <div class="stat" id="stats"></div>
  <div class="eqbar" id="eq"></div>

  <div class="grid" id="controls" style="margin-top:14px"></div>

  <div class="note" id="note"></div>

  <footer>純前端 HTML / Canvas，無外部相依。</footer>
</div>

<script>
let mode='lever';
const lever={w1:20,d1:3,w2:30,d2:2};
const pulley={W:120,N:2};
const cv=document.getElementById('cv'),cc=cv.getContext('2d');
const ctrl=document.getElementById('controls');
function fmt(x){return (Math.round(x*100)/100).toString();}

function buildControls(){
  ctrl.innerHTML='';
  const specs = mode==='lever' ? [
    {obj:lever,id:'w1',name:'左重 W₁',min:5,max:60,step:1,val:lever.w1,unit:'N',cls:'l'},
    {obj:lever,id:'d1',name:'左力臂 d₁',min:0.5,max:5,step:.1,val:lever.d1,unit:'m',cls:'l'},
    {obj:lever,id:'w2',name:'右重 W₂',min:5,max:60,step:1,val:lever.w2,unit:'N',cls:'r'},
    {obj:lever,id:'d2',name:'右力臂 d₂',min:0.5,max:5,step:.1,val:lever.d2,unit:'m',cls:'r'},
  ] : [
    {obj:pulley,id:'W',name:'載重 W',min:20,max:300,step:10,val:pulley.W,unit:'N'},
    {obj:pulley,id:'N',name:'支撐繩數 N',min:1,max:5,step:1,val:pulley.N,unit:'條'},
  ];
  specs.forEach(s=>{
    const box=document.createElement('div');box.className='ctrl '+(s.cls||'');
    box.innerHTML=`<label><span>${s.name}</span><span class="val" id="v_${s.id}">${fmt(s.val)} ${s.unit}</span></label>
      <input type="range" id="r_${s.id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.val}">`;
    ctrl.appendChild(box);
    box.querySelector('input').addEventListener('input',e=>{
      s.obj[s.id]=parseFloat(e.target.value);
      document.getElementById('v_'+s.id).textContent=`${fmt(s.obj[s.id])} ${s.unit}`;
      if(mode==='lever')targetAngle=null; draw();
    });
  });
}

// ===== 槓桿 =====
let angle=0, targetAngle=null;
function leverTorques(){return {L:lever.w1*lever.d1, R:lever.w2*lever.d2};}
function drawLever(){
  const W=cv.width,H=cv.height,px=W/2,py=H*0.5,PM=42,Lm=4.6;cc.clearRect(0,0,W,H);
  const {L,R}=leverTorques();
  const bal=Math.abs(L-R)<0.5;
  const goal=bal?0:Math.sign(R-L)*0.32;             // 傾倒方向
  if(targetAngle===null)targetAngle=goal;
  const th=angle;
  // 支點三角
  cc.fillStyle='#3a4756';cc.beginPath();cc.moveTo(px,py);cc.lineTo(px-26,py+50);cc.lineTo(px+26,py+50);cc.closePath();cc.fill();
  cc.strokeStyle='#26303f';cc.beginPath();cc.moveTo(px-180,py+50);cc.lineTo(px+180,py+50);cc.stroke();
  // 橫桿
  const pt=s=>({x:px+s*PM*Math.cos(th), y:py+s*PM*Math.sin(th)});
  const a=pt(-Lm),b=pt(Lm);
  cc.strokeStyle='#5a7bb0';cc.lineWidth=8;cc.lineCap='round';cc.beginPath();cc.moveTo(a.x,a.y);cc.lineTo(b.x,b.y);cc.stroke();cc.lineCap='butt';
  // 刻度
  cc.fillStyle='#46566b';cc.font='10px sans-serif';
  for(let s=-4;s<=4;s++){if(s===0)continue;const p=pt(s);cc.beginPath();cc.arc(p.x,p.y,2,0,7);cc.fill();}
  // 兩側重物
  function weight(s,w,col,lab){const p=pt(s);
    cc.strokeStyle=col;cc.lineWidth=2;cc.beginPath();cc.moveTo(p.x,p.y);cc.lineTo(p.x,p.y+26);cc.stroke();
    const sz=14+w*0.5;cc.fillStyle=col;cc.fillRect(p.x-sz/2,p.y+26,sz,sz);
    cc.fillStyle='#04121c';cc.font='bold 11px sans-serif';cc.textAlign='center';cc.fillText(w+'N',p.x,p.y+26+sz/2+4);cc.textAlign='left';
  }
  weight(-lever.d1,lever.w1,'#4cc2ff');
  weight(lever.d2,lever.w2,'#ff6b9d');
  // 力臂標註
  cc.fillStyle='#4cc2ff';cc.font='11px sans-serif';cc.fillText('d₁='+lever.d1+'m',pt(-lever.d1).x-20,py-12);
  cc.fillStyle='#ff6b9d';cc.fillText('d₂='+lever.d2+'m',pt(lever.d2).x-20,py-12);
  document.getElementById('sub').textContent=bal?'平衡':'向'+(R>L?'右':'左')+'傾倒';
}

// ===== 滑輪 =====
function drawPulley(){
  const W=cv.width,H=cv.height;cc.clearRect(0,0,W,H);
  const N=pulley.N, load=pulley.W, F=load/N;
  const topY=40, bx=W/2, botY=topY+150;
  // 頂梁
  cc.fillStyle='#3a4756';cc.fillRect(bx-150,topY-10,300,10);
  // N 條支撐繩
  cc.strokeStyle='#7CFFB2';cc.lineWidth=2;
  for(let i=0;i<N;i++){const x=bx-60+ i*(120/Math.max(1,N-1||1));cc.beginPath();cc.moveTo(x,topY);cc.lineTo(x,botY);cc.stroke();}
  // 動滑輪塊 + 載重
  cc.fillStyle='#1b2740';cc.strokeStyle='#5a7bb0';cc.lineWidth=2;cc.fillRect(bx-70,botY,140,18);cc.strokeRect(bx-70,botY,140,18);
  const lsz=46+load*0.12;cc.fillStyle='#ff6b9d';cc.fillRect(bx-lsz/2,botY+30,lsz,lsz*0.7);
  cc.fillStyle='#04121c';cc.font='bold 13px sans-serif';cc.textAlign='center';cc.fillText(load+' N',bx,botY+30+lsz*0.35+4);cc.textAlign='left';
  cc.strokeStyle='#5a7bb0';cc.beginPath();cc.moveTo(bx,botY+18);cc.lineTo(bx,botY+30);cc.stroke();
  // 施力端（右側繩往下拉）
  const ex=bx+60;cc.strokeStyle='#4cc2ff';cc.lineWidth=2;cc.beginPath();cc.moveTo(ex,topY);cc.lineTo(ex,botY+70);cc.stroke();
  cc.fillStyle='#4cc2ff';cc.beginPath();cc.moveTo(ex,botY+70);cc.lineTo(ex-6,botY+58);cc.lineTo(ex+6,botY+58);cc.closePath();cc.fill();
  cc.font='bold 13px sans-serif';cc.fillText('施力 F = '+F.toFixed(1)+' N',ex+10,botY+60);
  cc.fillStyle='#7CFFB2';cc.font='12px sans-serif';cc.fillText(N+' 條繩分擔載重',bx-150,botY+90);
  cc.fillStyle='#46566b';cc.fillText('要把載重拉高 1，需拉繩 '+N+'（省力但費距離）',bx-150,botY+110);
  document.getElementById('sub').textContent='機械利益 ='+N;
}

function draw(){
  if(mode==='lever')drawLever(); else drawPulley();
  drawStats();
}
function drawStats(){
  let rows,eqt,eqc,eqbg;
  if(mode==='lever'){
    const {L,R}=leverTorques();const bal=Math.abs(L-R)<0.5;
    rows=[['左力矩 W₁·d₁',L.toFixed(1)+' N·m','#4cc2ff'],['右力矩 W₂·d₂',R.toFixed(1)+' N·m','#ff6b9d'],
      ['力矩差',(R-L).toFixed(1)+' N·m','#ffce54']];
    if(bal){eqt='✓ 力矩相等 → 槓桿水平平衡';eqc='#7CFFB2';eqbg='rgba(124,255,178,.15)';}
    else{eqt='力矩不等 → 向'+(R>L?'右':'左')+'傾倒（該側力矩較大）';eqc='#ffce54';eqbg='rgba(255,206,84,.12)';}
  }else{
    const N=pulley.N,F=pulley.W/N;
    rows=[['機械利益 MA',''+N,'#7CFFB2'],['施力 F = W/N',F.toFixed(1)+' N','#4cc2ff'],
      ['省力倍數',N+' 倍','#ffce54'],['需拉繩長 (相對載重上升)',N+' 倍','#ff6b9d']];
    eqt='功守恆：F × (N·h) = W × h　→ 省力 '+N+' 倍、費距離 '+N+' 倍';eqc='#8a99ad';eqbg='rgba(138,153,173,.12)';
  }
  document.getElementById('stats').innerHTML=rows.map(r=>
    `<div class="box"><div class="k">${r[0]}</div><div class="v" style="color:${r[2]}">${r[1]}</div></div>`).join('');
  const eq=document.getElementById('eq');eq.textContent=eqt;eq.style.color=eqc;eq.style.background=eqbg;
}
function setNote(){
  document.getElementById('note').innerHTML = mode==='lever' ?
    '<b>物理重點：</b>力矩（轉動效果）= 力 × 力臂 <code>τ = F·d</code>。槓桿在 <code>W₁·d₁ = W₂·d₂</code> 時平衡。'+
    '所以<b>小力配長力臂</b>可以撬動<b>大重量配短力臂</b>——這就是「給我一根夠長的槓桿」的原理。力臂是支點到力作用線的<b>垂直距離</b>。'
    :
    '<b>物理重點：</b>滑輪組用 <code>N</code> 條繩共同吊住載重，每條分擔 <code>W/N</code>，所以施力 <code>F = W/N</code>，'+
    '<b>機械利益 = N</b>。但天下沒有白吃的午餐：要把載重升高 h，必須拉繩 <code>N·h</code>。'+
    '功 <code>W×h = F×(N·h)</code> 守恆——機械只能<b>省力</b>或<b>省距離</b>，不能省功。';
}

// 動畫（槓桿傾倒緩動）
function loop(){
  if(mode==='lever'&&targetAngle!==null){angle+=(targetAngle-angle)*0.12;drawLever();}
  requestAnimationFrame(loop);
}
const mL=document.getElementById('mLever'),mP=document.getElementById('mPulley');
function switchMode(m){mode=m;mL.classList.toggle('on',m==='lever');mP.classList.toggle('on',m==='pulley');
  document.getElementById('leverPresets').style.display=m==='lever'?'inline':'none';
  document.getElementById('canvasLabel').textContent=m==='lever'?'槓桿：藍=左側力矩，紅=右側力矩，相等則水平平衡':'滑輪組：綠=支撐繩（共 N 條），藍=施力端';
  targetAngle=null;angle=0;buildControls();setNote();draw();}
mL.onclick=()=>switchMode('lever');mP.onclick=()=>switchMode('pulley');
const PRE={bal:{w1:20,d1:3,w2:30,d2:2},adv:{w1:10,d1:5,w2:50,d2:1}};
document.querySelectorAll('[data-preset]').forEach(b=>b.onclick=()=>{
  const p=PRE[b.dataset.preset];if(!p)return;Object.assign(lever,p);targetAngle=null;buildControls();draw();
});

buildControls();setNote();draw();
requestAnimationFrame(loop);
window.addEventListener('resize',draw);
</script>
</body>
</html>
